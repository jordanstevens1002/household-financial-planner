services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-household_finance}
      POSTGRES_USER: ${POSTGRES_USER:-household_finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./api
      target: runtime
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://household_finance:${POSTGRES_PASSWORD}@postgres:5432/household_finance}
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL}
      ALLOW_DEVELOPMENT_AUTH: ${ALLOW_DEVELOPMENT_AUTH:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  appsmith:
    image: index.docker.io/appsmith/appsmith-ce:${APPSMITH_VERSION:-v1.93}
    ports:
      - "8080:80"
    volumes:
      - appsmith_stacks:/appsmith-stacks
    restart: unless-stopped

volumes:
  postgres_data:
  appsmith_stacks:
